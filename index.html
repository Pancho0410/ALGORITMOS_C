<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album FIFA 2026 — Tablero de Referencia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #11141a;
    --border:    #1e2330;
    --accent:    #00e5ff;
    --gold:      #ffd94a;
    --purple:    #b06bff;
    --text:      #e2e8f0;
    --muted:     #4a5568;
    --comun:     #4ade80;
    --epico:     #818cf8;
    --leyenda:   #fbbf24;
    --new-glow:  0 0 12px rgba(0,229,255,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; padding: 32px 24px 80px; max-width: 1400px; margin: 0 auto; }

  /* ── HEADER ── */
  header { margin-bottom: 36px; }
  .header-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-meta {
    display: flex; gap: 24px; flex-wrap: wrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 12px;
  }
  .header-meta span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-c { background: var(--comun); }
  .dot-e { background: var(--epico); }
  .dot-l { background: var(--leyenda); }

  /* ── CONTROLS ── */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 28px; align-items: center;
  }
  .search-box {
    flex: 1; min-width: 220px; max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); box-shadow: var(--new-glow); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .filter-btn:hover { border-color: var(--muted); color: var(--text); }
  .filter-btn.active-c { border-color: var(--comun); color: var(--comun); background: rgba(74,222,128,0.08); }
  .filter-btn.active-e { border-color: var(--epico); color: var(--epico); background: rgba(129,140,248,0.08); }
  .filter-btn.active-l { border-color: var(--leyenda); color: var(--leyenda); background: rgba(251,191,36,0.08); }
  .filter-btn.active-all { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.08); }

  /* ── SEL TABS ── */
  .sel-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .sel-tab {
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sel-tab:hover { color: var(--text); border-color: var(--muted); }
  .sel-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* ── GRID ── */
  .grid-container { overflow-x: auto; padding-bottom: 8px; }

  table {
    border-collapse: separate;
    border-spacing: 3px;
    min-width: 900px;
    width: 100%;
  }

  /* Column headers (pos) */
  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 4px 6px;
    text-align: center;
    letter-spacing: 1px;
  }
  thead th.pos-label { color: var(--text); font-size: 0.6rem; }
  thead th.range-c { color: var(--comun); }
  thead th.range-e { color: var(--epico); }
  thead th.range-l { color: var(--leyenda); }

  /* Row headers (sel) */
  .row-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text);
    padding: 0 12px 0 4px;
    white-space: nowrap;
    vertical-align: middle;
  }
  .row-index {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    padding-right: 8px;
    text-align: right;
    vertical-align: middle;
  }

  /* Cells */
  td.cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0;
    min-width: 82px;
    width: 82px;
    height: 52px;
    vertical-align: top;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    position: relative;
    overflow: hidden;
  }
  td.cell:hover {
    transform: scale(1.04);
    z-index: 10;
    border-color: var(--accent);
    box-shadow: var(--new-glow);
  }
  td.cell.highlight {
    border-color: var(--gold) !important;
    box-shadow: 0 0 14px rgba(255,217,74,0.5) !important;
    animation: pulse 0.6s ease;
  }
  td.cell.dim { opacity: 0.18; }

  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  /* Level stripe */
  td.cell::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  td.cell.lvl-c::before { background: var(--comun); }
  td.cell.lvl-e::before { background: var(--epico); }
  td.cell.lvl-l::before { background: var(--leyenda); box-shadow: 0 0 8px var(--leyenda); }

  .cell-inner {
    padding: 6px 6px 4px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .cell-name {
    font-size: 0.67rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    word-break: break-word;
  }
  .cell-pos-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .cell-coords {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    opacity: 0.6;
    text-align: right;
  }

  /* Range dividers */
  td.cell.range-start-e { border-left: 2px solid rgba(129,140,248,0.4) !important; }
  td.cell.range-start-l { border-left: 2px solid rgba(251,191,36,0.5) !important; }

  /* ── TOOLTIP ── */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 100;
    background: #1a1f2e;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), var(--new-glow);
    pointer-events: none;
  }
  .tooltip.show { display: block; }
  .tt-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .tt-name.lvl-c { color: var(--comun); }
  .tt-name.lvl-e { color: var(--epico); }
  .tt-name.lvl-l { color: var(--leyenda); }
  .tt-row {
    display: flex; justify-content: space-between; gap: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .tt-row span:last-child { color: var(--text); }
  .tt-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .tt-coords {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
  }

  /* ── LEGEND BAR ── */
  .legend-bar {
    display: flex; gap: 32px; flex-wrap: wrap;
    margin-top: 28px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-stripe { width: 24px; height: 3px; border-radius: 2px; }

  /* ── STATS ── */
  .stats-row {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    flex: 1; min-width: 120px;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    line-height: 1;
  }
  .stat-val.c { color: var(--comun); }
  .stat-val.e { color: var(--epico); }
  .stat-val.l { color: var(--leyenda); }
  .stat-val.t { color: var(--accent); }
  .stat-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
</style>
</head>

// ═══════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════
let activeFilter = 'all';
let activeSel = 'all';
let pinnedCell = null;

// Stats
function buildStats() {
  const row = document.getElementById('statsRow');
  let total = 0, comun = 0, epico = 0, leyenda = 0;
  catalog.forEach(sel => sel.forEach(j => {
    total++;
    if (j.niv === 'Comun') comun++;
    else if (j.niv === 'Epico') epico++;
    else leyenda++;
  }));
  row.innerHTML = `
    <div class="stat-card"><div class="stat-val t">${total}</div><div class="stat-lbl">Total figuritas</div></div>
    <div class="stat-card"><div class="stat-val c">${comun}</div><div class="stat-lbl">Común</div></div>
    <div class="stat-card"><div class="stat-val e">${epico}</div><div class="stat-lbl">Épico</div></div>
    <div class="stat-card"><div class="stat-val l">${leyenda}</div><div class="stat-lbl">Leyenda</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--text)">${SELS.length}</div><div class="stat-lbl">Selecciones</div></div>
  `;
}

// Sel tabs
function buildTabs() {
  const tabs = document.getElementById('selTabs');
  let html = `<button class="sel-tab active" data-sel="all">Todas</button>`;
  SELS.forEach((s, i) => {
    html += `<button class="sel-tab" data-sel="${i}">${s}</button>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll('.sel-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSel = btn.dataset.sel === 'all' ? 'all' : parseInt(btn.dataset.sel);
      tabs.querySelectorAll('.sel-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    });
  });
}

// Table header
function buildHeader() {
  const head = document.getElementById('tableHead');
  let html = '<tr><th></th><th></th>';
  for (let p = 0; p < 15; p++) {
    const cls = p < 10 ? 'range-c' : p < 14 ? 'range-e' : 'range-l';
    html += `<th class="pos-label ${cls}">pos ${p}</th>`;
  }
  html += '</tr>';
  // Range labels
  html += '<tr><th></th><th></th>';
  html += `<th colspan="10" style="color:var(--comun);font-family:'DM Mono',monospace;font-size:0.6rem;text-align:left;padding-left:4px">── COMÚN (0–9) ──</th>`;
  html += `<th colspan="4" style="color:var(--epico);font-family:'DM Mono',monospace;font-size:0.6rem;text-align:left">── ÉPICO (10–13) ──</th>`;
  html += `<th style="color:var(--leyenda);font-family:'DM Mono',monospace;font-size:0.6rem">L</th>`;
  html += '</tr>';
  head.innerHTML = html;
}

// Render table
function renderTable() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const tbody = document.getElementById('tableBody');
  let html = '';

  catalog.forEach((selData, si) => {
    if (activeSel !== 'all' && activeSel !== si) return;

    html += `<tr>
      <td class="row-index">${si}</td>
      <td class="row-header">${SELS[si]}</td>`;

    selData.forEach((j, pi) => {
      const lvlCls = j.niv === 'Comun' ? 'lvl-c' : j.niv === 'Epico' ? 'lvl-e' : 'lvl-l';
      const rangeStart = pi === 10 ? 'range-start-e' : pi === 14 ? 'range-start-l' : '';

      const matchesFilter = activeFilter === 'all' || j.niv === activeFilter;
      const matchesSearch = !query || j.n.toLowerCase().includes(query) ||
                            SELS[si].toLowerCase().includes(query) ||
                            j.pos.toLowerCase().includes(query);
      const dimCls = (!matchesFilter || !matchesSearch) ? 'dim' : '';

      html += `<td class="cell ${lvlCls} ${rangeStart} ${dimCls}"
                  data-si="${si}" data-pi="${pi}"
                  data-name="${j.n}" data-sel="${SELS[si]}"
                  data-pos="${j.pos}" data-niv="${j.niv}"
                  data-alt="${j.alt}" data-pes="${j.pes}" data-dor="${j.dor}">
        <div class="cell-inner">
          <div>
            <div class="cell-name">${j.n}</div>
            <div class="cell-pos-tag">${j.pos.substring(0,3).toUpperCase()}</div>
          </div>
          <div class="cell-coords">[${si},${pi}]</div>
        </div>
      </td>`;
    });
    html += '</tr>';
  });

  tbody.innerHTML = html;
  attachCellEvents();
}

// Tooltip
const tooltip = document.getElementById('tooltip');
function showTooltip(cell, x, y) {
  document.getElementById('tt-name').textContent = cell.dataset.name;
  document.getElementById('tt-name').className = `tt-name lvl-${cell.dataset.niv === 'Comun' ? 'c' : cell.dataset.niv === 'Epico' ? 'e' : 'l'}`;
  document.getElementById('tt-sel').textContent = cell.dataset.sel;
  document.getElementById('tt-pos').textContent = cell.dataset.pos;
  document.getElementById('tt-niv').textContent = cell.dataset.niv;
  document.getElementById('tt-dor').textContent = '#' + cell.dataset.dor;
  document.getElementById('tt-alt').textContent = cell.dataset.alt + ' m';
  document.getElementById('tt-pes').textContent = cell.dataset.pes + ' kg';
  document.getElementById('tt-coords').textContent =
    `album[${cell.dataset.si}, ${cell.dataset.pi}]  ·  indiceArte = ${parseInt(cell.dataset.si)*15 + parseInt(cell.dataset.pi)}`;

  const tw = tooltip.offsetWidth || 220;
  const th = tooltip.offsetHeight || 200;
  let left = x + 14;
  let top  = y - 10;
  if (left + tw > window.innerWidth - 10) left = x - tw - 14;
  if (top  + th > window.innerHeight - 10) top = window.innerHeight - th - 10;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
  tooltip.classList.add('show');
}

function attachCellEvents() {
  document.querySelectorAll('td.cell').forEach(cell => {
    cell.addEventListener('mouseenter', e => {
      if (!pinnedCell) showTooltip(cell, e.clientX, e.clientY);
    });
    cell.addEventListener('mousemove', e => {
      if (!pinnedCell) showTooltip(cell, e.clientX, e.clientY);
    });
    cell.addEventListener('mouseleave', () => {
      if (!pinnedCell) tooltip.classList.remove('show');
    });
    cell.addEventListener('click', e => {
      e.stopPropagation();
      if (pinnedCell === cell) {
        pinnedCell = null;
        cell.classList.remove('highlight');
        tooltip.classList.remove('show');
      } else {
        if (pinnedCell) pinnedCell.classList.remove('highlight');
        pinnedCell = cell;
        cell.classList.add('highlight');
        showTooltip(cell, e.clientX, e.clientY);
      }
    });
  });
}

document.addEventListener('click', () => {
  if (pinnedCell) {
    pinnedCell.classList.remove('highlight');
    pinnedCell = null;
    tooltip.classList.remove('show');
  }
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    const cls = activeFilter === 'all' ? 'active-all' :
                activeFilter === 'Comun' ? 'active-c' :
                activeFilter === 'Epico' ? 'active-e' : 'active-l';
    btn.classList.add(cls);
    renderTable();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', renderTable);

// Init
buildStats();
buildTabs();
buildHeader();
renderTable();
</script>
