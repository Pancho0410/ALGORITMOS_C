<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ERD – Mundiales de Fútbol FIFA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --border: #1e2d40;
    --accent: #00c2ff;
    --accent2: #ff6b35;
    --accent3: #a8ff78;
    --text: #d4e0ec;
    --text-dim: #5a7a95;
    --pk: #ffd166;
    --fk: #ff6b9d;
    --attr: #8ecae6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(90deg, #0a0e14 0%, #0d1a26 100%);
  }
  header .ball { font-size: 2rem; }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  header p {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .legend {
    display: flex;
    gap: 24px;
    padding: 14px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; }

  .canvas-wrap {
    overflow: auto;
    padding: 40px;
    min-height: calc(100vh - 120px);
  }

  svg {
    display: block;
    margin: 0 auto;
  }

  /* Entity tables */
  .entity { cursor: default; }
  .entity-header { font-family: 'IBM Plex Mono', monospace; }
  .entity rect.body { fill: var(--surface); stroke: var(--border); stroke-width: 1.5; }
  .entity rect.header-bg { rx: 4; }
  .entity text.title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    fill: #0a0e14;
  }
  .entity text.attr {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    fill: var(--attr);
  }
  .entity text.pk { fill: var(--pk); font-weight: 600; }
  .entity text.fk { fill: var(--fk); }
  .entity text.badge {
    font-size: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
  }
  .entity line.row-div { stroke: var(--border); stroke-width: 1; }

  /* Connector lines */
  .rel { fill: none; stroke-width: 1.5; }
  .rel-main { stroke: var(--accent); opacity: 0.5; }
  .rel-sec { stroke: var(--text-dim); opacity: 0.45; stroke-dasharray: 4 3; }
  .rel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    fill: var(--text-dim);
  }
  .cardinality {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="ball">⚽</div>
  <div>
    <h1>Diagrama Entidad–Relación</h1>
    <p>Base de datos · Mundiales de Fútbol FIFA · Sistemas de Bases de Datos 2 – 2026</p>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#ffd166"></div>PK – Primary Key</div>
  <div class="legend-item"><div class="dot" style="background:#ff6b9d"></div>FK – Foreign Key</div>
  <div class="legend-item"><div class="dot" style="background:#8ecae6"></div>Atributo normal</div>
  <div class="legend-item"><div class="dot" style="background:#00c2ff; opacity:.5"></div>Relación principal</div>
  <div class="legend-item"><div class="dot" style="background:#5a7a95"></div>Relación secundaria</div>
  <div class="legend-item" style="margin-left:auto; color:#5a7a95">NN = NOT NULL &nbsp;|&nbsp; UQ = UNIQUE &nbsp;|&nbsp; CK = CHECK</div>
</div>

<div class="canvas-wrap">
<svg id="erd" width="1460" height="1120" viewBox="0 0 1460 1120">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c2ff" opacity="0.5"/>
    </marker>
    <marker id="arrow-sec" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5a7a95" opacity="0.5"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════
       RELATIONSHIP LINES (drawn before entities)
  ════════════════════════════════════════════ -->

  <!-- PAIS → MUNDIAL (sede) -->
  <path class="rel rel-main" d="M 305,110 Q 305,60 560,60 Q 620,60 620,90" stroke="#00c2ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="rel-label" x="430" y="52">sede (1:N)</text>

  <!-- MUNDIAL → GRUPO -->
  <line class="rel rel-main" x1="730" y1="175" x2="730" y2="280" marker-end="url(#arrow)"/>
  <text class="rel-label" x="735" y="235">1:N</text>

  <!-- GRUPO → PARTICIPACION_GRUPO (pais en grupo) -->
  <line class="rel rel-main" x1="620" y1="350" x2="480" y2="490" marker-end="url(#arrow)"/>
  <text class="rel-label" x="515" y="415">1:N</text>

  <!-- PAIS → PARTICIPACION_GRUPO -->
  <line class="rel rel-main" x1="305" y1="295" x2="380" y2="490" marker-end="url(#arrow)"/>
  <text class="rel-label" x="310" y="405">1:N</text>

  <!-- GRUPO → PARTIDO -->
  <line class="rel rel-main" x1="780" y1="360" x2="940" y2="490" marker-end="url(#arrow)"/>
  <text class="rel-label" x="850" y="415">1:N</text>

  <!-- MUNDIAL → PARTIDO (fase final no tiene grupo) -->
  <line class="rel rel-sec" x1="780" y1="130" x2="1050" y2="490" marker-end="url(#arrow-sec)" stroke-dasharray="5 3"/>
  <text class="rel-label" x="970" y="310">1:N</text>

  <!-- PAIS → PARTIDO (local) -->
  <path class="rel rel-main" d="M 305,240 Q 305,460 860,560" stroke="#00c2ff" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="rel-label" x="430" y="500">local (1:N)</text>

  <!-- PAIS → PARTIDO (visitante) -->
  <path class="rel rel-main" d="M 305,255 Q 290,480 840,580" stroke="#ff6b9d" fill="none" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text class="rel-label" x="330" y="540">visit. (1:N)</text>

  <!-- PARTIDO → GOL -->
  <line class="rel rel-main" x1="1100" y1="620" x2="1200" y2="720" marker-end="url(#arrow)"/>
  <text class="rel-label" x="1145" y="665">1:N</text>

  <!-- JUGADOR → GOL -->
  <line class="rel rel-main" x1="1200" y1="720" x2="1230" y2="720"/>
  <path class="rel rel-main" d="M 1200,895 Q 1310,895 1310,820" stroke="#00c2ff" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="rel-label" x="1315" y="810">1:N</text>

  <!-- PAIS → JUGADOR -->
  <path class="rel rel-sec" d="M 305,310 Q 305,920 1100,930" stroke="#5a7a95" fill="none" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-sec)"/>
  <text class="rel-label" x="700" y="955">1:N</text>

  <!-- MUNDIAL → PREMIO -->
  <line class="rel rel-main" x1="780" y1="160" x2="1110" y2="160" marker-end="url(#arrow)"/>
  <text class="rel-label" x="890" y="152">1:N</text>

  <!-- PAIS → PREMIO -->
  <path class="rel rel-main" d="M 305,170 Q 305,145 1110,155" stroke="#00c2ff" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MUNDIAL → POSICION_FINAL -->
  <path class="rel rel-main" d="M 730,180 Q 730,800 860,840" stroke="#00c2ff" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="rel-label" x="735" y="750">1:N</text>

  <!-- PAIS → POSICION_FINAL -->
  <path class="rel rel-main" d="M 305,300 Q 305,870 860,870" stroke="#a8ff78" fill="none" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- MUNDIAL → GOLEADOR (through jugador) -->
  <path class="rel rel-sec" d="M 780,165 Q 980,50 1100,880" stroke="#5a7a95" fill="none" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-sec)"/>

  <!-- JUGADOR → POSICION_FINAL (capitán) OPTIONAL label only -->


  <!-- ═══════════════════════════════════════════
       ENTITIES
  ════════════════════════════════════════════ -->

  <!-- ────────────────────────────────────────
       1. PAIS
  ──────────────────────────────────────── -->
  <g class="entity" transform="translate(100, 90)">
    <rect class="body" x="0" y="0" width="205" height="230" rx="4"/>
    <rect x="0" y="0" width="205" height="28" rx="4" fill="#ff6b35"/>
    <rect x="0" y="16" width="205" height="12" fill="#ff6b35"/>
    <text class="title" x="103" y="18" text-anchor="middle">PAIS</text>

    <!-- rows -->
    <g transform="translate(0, 28)">
      <!-- PK -->
      <rect x="0" y="0" width="205" height="22" fill="#1a2535"/>
      <text class="attr pk" x="10" y="15">id_pais</text>
      <text class="badge" x="155" y="15" fill="#ffd166">INT PK NN</text>
      <line class="row-div" x1="0" y1="22" x2="205" y2="22"/>

      <rect x="0" y="22" width="205" height="22" fill="#111720"/>
      <text class="attr" x="10" y="37">nombre</text>
      <text class="badge" x="130" y="37" fill="#8ecae6">VARCHAR(60) NN UQ</text>
      <line class="row-div" x1="0" y1="44" x2="205" y2="44"/>

      <rect x="0" y="44" width="205" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="59">codigo_fifa</text>
      <text class="badge" x="130" y="59" fill="#8ecae6">CHAR(3) UQ</text>
      <line class="row-div" x1="0" y1="66" x2="205" y2="66"/>

      <rect x="0" y="66" width="205" height="22" fill="#111720"/>
      <text class="attr" x="10" y="81">confederacion</text>
      <text class="badge" x="140" y="81" fill="#8ecae6">VARCHAR(10)</text>
      <line class="row-div" x1="0" y1="88" x2="205" y2="88"/>

      <rect x="0" y="88" width="205" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="103">continente</text>
      <text class="badge" x="130" y="103" fill="#8ecae6">VARCHAR(20)</text>
      <line class="row-div" x1="0" y1="110" x2="205" y2="110"/>

      <!-- last row rounding -->
      <rect x="0" y="110" width="205" height="22" rx="0" fill="#111720"/>
      <text class="attr" x="10" y="125">bandera_url</text>
      <text class="badge" x="130" y="125" fill="#5a7a95">VARCHAR(200)</text>
      <line class="row-div" x1="0" y1="132" x2="205" y2="132"/>

      <rect x="0" y="132" width="205" height="70" rx="0" fill="#0d1520"/>
      <text x="10" y="150" font-family="IBM Plex Mono" font-size="8" fill="#5a7a95">CONSTRAINTS:</text>
      <text x="10" y="163" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">CK confederacion IN ('UEFA','CONMEBOL',</text>
      <text x="10" y="174" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">'CONCACAF','CAF','AFC','OFC')</text>
      <text x="10" y="188" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">IDX: nombre, codigo_fifa</text>
    </g>
  </g>

  <!-- ────────────────────────────────────────
       2. MUNDIAL
  ──────────────────────────────────────── -->
  <g class="entity" transform="translate(560, 90)">
    <rect class="body" x="0" y="0" width="220" height="215" rx="4"/>
    <rect x="0" y="0" width="220" height="28" rx="4" fill="#00c2ff"/>
    <rect x="0" y="16" width="220" height="12" fill="#00c2ff"/>
    <text class="title" x="110" y="18" text-anchor="middle">MUNDIAL</text>
    <g transform="translate(0,28)">
      <rect x="0" y="0" width="220" height="22" fill="#1a2535"/>
      <text class="attr pk" x="10" y="15">id_mundial</text>
      <text class="badge" x="155" y="15" fill="#ffd166">INT PK NN</text>
      <line class="row-div" x1="0" y1="22" x2="220" y2="22"/>

      <rect x="0" y="22" width="220" height="22" fill="#111720"/>
      <text class="attr" x="10" y="37">anio</text>
      <text class="badge" x="130" y="37" fill="#8ecae6">SMALLINT NN UQ</text>
      <line class="row-div" x1="0" y1="44" x2="220" y2="44"/>

      <rect x="0" y="44" width="220" height="22" fill="#1a2535"/>
      <text class="attr fk" x="10" y="59">id_pais_sede</text>
      <text class="badge" x="140" y="59" fill="#ff6b9d">INT FK NN</text>
      <line class="row-div" x1="0" y1="66" x2="220" y2="66"/>

      <rect x="0" y="66" width="220" height="22" fill="#111720"/>
      <text class="attr" x="10" y="81">fecha_inicio</text>
      <text class="badge" x="140" y="81" fill="#8ecae6">DATE NN</text>
      <line class="row-div" x1="0" y1="88" x2="220" y2="88"/>

      <rect x="0" y="88" width="220" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="103">fecha_fin</text>
      <text class="badge" x="140" y="103" fill="#8ecae6">DATE NN</text>
      <line class="row-div" x1="0" y1="110" x2="220" y2="110"/>

      <rect x="0" y="110" width="220" height="22" fill="#111720"/>
      <text class="attr" x="10" y="125">num_equipos</text>
      <text class="badge" x="145" y="125" fill="#8ecae6">TINYINT NN</text>
      <line class="row-div" x1="0" y1="132" x2="220" y2="132"/>

      <rect x="0" y="132" width="220" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="147">num_partidos</text>
      <text class="badge" x="145" y="147" fill="#8ecae6">TINYINT</text>
      <line class="row-div" x1="0" y1="154" x2="220" y2="154"/>

      <rect x="0" y="154" width="220" height="43" fill="#0d1520"/>
      <text x="10" y="170" font-family="IBM Plex Mono" font-size="8" fill="#5a7a95">CONSTRAINTS:</text>
      <text x="10" y="181" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">CK anio &gt;= 1930</text>
      <text x="10" y="192" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">IDX: anio · FK: id_pais_sede→PAIS</text>
    </g>
  </g>

  <!-- ────────────────────────────────────────
       3. GRUPO
  ──────────────────────────────────────── -->
  <g class="entity" transform="translate(560, 280)">
    <rect class="body" x="0" y="0" width="220" height="145" rx="4"/>
    <rect x="0" y="0" width="220" height="28" rx="4" fill="#a8ff78" />
    <rect x="0" y="16" width="220" height="12" fill="#a8ff78"/>
    <text class="title" x="110" y="18" text-anchor="middle" fill="#0a0e14">GRUPO</text>
    <g transform="translate(0,28)">
      <rect x="0" y="0" width="220" height="22" fill="#1a2535"/>
      <text class="attr pk" x="10" y="15">id_grupo</text>
      <text class="badge" x="155" y="15" fill="#ffd166">INT PK NN</text>
      <line class="row-div" x1="0" y1="22" x2="220" y2="22"/>

      <rect x="0" y="22" width="220" height="22" fill="#111720"/>
      <text class="attr fk" x="10" y="37">id_mundial</text>
      <text class="badge" x="140" y="37" fill="#ff6b9d">INT FK NN</text>
      <line class="row-div" x1="0" y1="44" x2="220" y2="44"/>

      <rect x="0" y="44" width="220" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="59">nombre_grupo</text>
      <text class="badge" x="150" y="59" fill="#8ecae6">CHAR(1) NN</text>
      <line class="row-div" x1="0" y1="66" x2="220" y2="66"/>

      <rect x="0" y="66" width="220" height="55" fill="#0d1520"/>
      <text x="10" y="82" font-family="IBM Plex Mono" font-size="8" fill="#5a7a95">CONSTRAINTS:</text>
      <text x="10" y="93" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">UQ(id_mundial, nombre_grupo)</text>
      <text x="10" y="104" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">CK nombre_grupo IN ('A'..'H','1'..'6')</text>
      <text x="10" y="115" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">FK: id_mundial→MUNDIAL</text>
    </g>
  </g>

  <!-- ────────────────────────────────────────
       4. PARTICIPACION_GRUPO  (pais en grupo)
  ──────────────────────────────────────── -->
  <g class="entity" transform="translate(270, 490)">
    <rect class="body" x="0" y="0" width="230" height="230" rx="4"/>
    <rect x="0" y="0" width="230" height="28" rx="4" fill="#ffd166"/>
    <rect x="0" y="16" width="230" height="12" fill="#ffd166"/>
    <text class="title" x="115" y="18" text-anchor="middle" fill="#0a0e14">PARTICIPACION_GRUPO</text>
    <g transform="translate(0,28)">
      <rect x="0" y="0" width="230" height="22" fill="#1a2535"/>
      <text class="attr pk" x="10" y="15">id_participacion</text>
      <text class="badge" x="158" y="15" fill="#ffd166">INT PK NN</text>
      <line class="row-div" x1="0" y1="22" x2="230" y2="22"/>

      <rect x="0" y="22" width="230" height="22" fill="#111720"/>
      <text class="attr fk" x="10" y="37">id_grupo</text>
      <text class="badge" x="150" y="37" fill="#ff6b9d">INT FK NN</text>
      <line class="row-div" x1="0" y1="44" x2="230" y2="44"/>

      <rect x="0" y="44" width="230" height="22" fill="#1a2535"/>
      <text class="attr fk" x="10" y="59">id_pais</text>
      <text class="badge" x="150" y="59" fill="#ff6b9d">INT FK NN</text>
      <line class="row-div" x1="0" y1="66" x2="230" y2="66"/>

      <rect x="0" y="66" width="230" height="22" fill="#111720"/>
      <text class="attr" x="10" y="81">pj</text>
      <text class="badge" x="150" y="81" fill="#8ecae6">TINYINT DEFAULT 0</text>
      <line class="row-div" x1="0" y1="88" x2="230" y2="88"/>

      <rect x="0" y="88" width="230" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="103">pg · pe · pp</text>
      <text class="badge" x="150" y="103" fill="#8ecae6">TINYINT x3</text>
      <line class="row-div" x1="0" y1="110" x2="230" y2="110"/>

      <rect x="0" y="110" width="230" height="22" fill="#111720"/>
      <text class="attr" x="10" y="125">gf · gc · dif</text>
      <text class="badge" x="150" y="125" fill="#8ecae6">SMALLINT x3</text>
      <line class="row-div" x1="0" y1="132" x2="230" y2="132"/>

      <rect x="0" y="132" width="230" height="22" fill="#1a2535"/>
      <text class="attr" x="10" y="147">puntos</text>
      <text class="badge" x="150" y="147" fill="#8ecae6">TINYINT DEFAULT 0</text>
      <line class="row-div" x1="0" y1="154" x2="230" y2="154"/>

      <rect x="0" y="154" width="230" height="22" fill="#111720"/>
      <text class="attr" x="10" y="169">posicion_grupo</text>
      <text class="badge" x="162" y="169" fill="#8ecae6">TINYINT</text>
      <line class="row-div" x1="0" y1="176" x2="230" y2="176"/>

      <rect x="0" y="176" width="230" height="50" fill="#0d1520"/>
      <text x="10" y="192" font-family="IBM Plex Mono" font-size="8" fill="#5a7a95">CONSTRAINTS:</text>
      <text x="10" y="203" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">UQ(id_grupo, id_pais)</text>
      <text x="10" y="214" font-family="IBM Plex Mono" font-size="7.5" fill="#5a7a95">FK: id_grupo→GRUPO · id_pais→PAIS</text>
    </g>
  </g>

  <!-- ────────────────────────────────────────
       5. PARTIDO
  ──────────────────────────────────────── -->
  <g class="entity" transform="translate(840, 490)">
    <rect class="body" x="0" y="0" width="240" height="310" rx="4"/>
    <rect x="0" y="0" width="240" height="28" rx="4" fill="#00c2ff"/>
    <rect x="0" y="16" width="240" height="12" fill="#00c2ff"/>
    <text class="title" x="120" y="18" text-anchor="middle" fill="#0a0e14">PARTIDO</text>
    <g transform="translate(0,28)">
      <rect x="0" y="0" width="240" height="22" fill="#1a2535"/>
      <text class="attr pk" x="10" y="15">id_partido</text>
